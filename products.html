<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Website</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <p id="logo">ECOM</p>
      <nav>
        <ul>
          <a href="index.html">
            <li>Home</li>
          </a>
          <a href="products.html">
            <li>Products</li>
          </a>
          <a href="about-us.html">
            <li>About Us</li>
          </a>
        </ul>
      </nav>
    </header>
    <main>
      <h1>Products</h1>
      <section class="product-container">
        <a href="#">
          <figure>
            <img
              class="product-image"
              src="img/cable-knit.png"
              alt="cable knit sweater"
            />
            <figcaption>Cable Knit Sweater</figcaption>
          </figure>
        </a>

        <a href="#">
          <figure>
            <img class="product-image" src="img/cardigan.png" alt="cardigan" />
            <figcaption>Cardigan</figcaption>
          </figure>
        </a>

        <a href="#">
          <figure>
            <img
              class="product-image"
              src="img/quarter-zip.png"
              alt="quarter zip"
            />
            <figcaption>Quarter Zip</figcaption>
          </figure>
        </a>

        <a href="#">
          <figure>
            <img
              class="product-image"
              src="img/baseball-hat.png"
              alt="baseball hat"
            />
            <figcaption>Baseball Hat</figcaption>
          </figure>
        </a>
      </section>
    </main>
    <footer>
      <p id="footer">© 2026 | ECOM | All Rights Reserved.</p>
    </footer>
  </body>
</html>
